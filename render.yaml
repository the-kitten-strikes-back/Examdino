services:
  - type: web
    name: examdino
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --threads 8 -w 1 app:app
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: examdino-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: examdino-db
    databaseName: examdino
    user: examdino
    plan: free
