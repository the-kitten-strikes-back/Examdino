{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <div class="card auth-card">
      <p class="hero-kicker">Account email</p>
      <h1>{{ title }}</h1>
      <p class="hero-text">{{ message }}</p>
      {% if action_url %}
        <div class="hero-actions">
          <a class="btn btn-primary" href="{{ action_url }}">{{ action_label or "Continue" }}</a>
        </div>
      {% endif %}
      <div class="hero-actions">
        <a class="btn btn-ghost" href="{{ url_for('login') }}">Back to login</a>
      </div>
    </div>
  </section>
{% endblock %}
